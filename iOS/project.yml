name: Pullupjournal
options:
  bundleIdPrefix: com.shimondeitel.pullupjournal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pullupjournal:
    type: application
    platform: iOS
    sources:
      - path: Pullupjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pullupjournal
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pullupjournal/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PullupjournalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PullupjournalTests
      - path: Pullupjournal.storekit
    dependencies:
      - target: Pullupjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pullupjournal.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PullupjournalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PullupjournalUITests
    dependencies:
      - target: Pullupjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pullupjournal.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pullupjournal:
    build:
      targets:
        Pullupjournal: all
        PullupjournalTests: [test]
        PullupjournalUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pullupjournal.storekit
    test:
      config: Debug
      storeKitConfiguration: Pullupjournal.storekit
      targets:
        - PullupjournalTests
        - PullupjournalUITests
    archive:
      config: Release
